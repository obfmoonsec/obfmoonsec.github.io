<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bức thư của Mạnh Dũng</title>
    <style>
        body {
            margin: 0;
            background-color: #fff0f5; /* Màu nền hồng nhạt */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 15px;
            box-sizing: border-box;
        }

        .envelope {
            background: white;
            width: 100%;
            max-width: 450px;
            /* Tự co giãn theo nội dung, không bị nhỏ */
            height: auto; 
            min-height: 400px;
            max-height: 85vh; 
            padding: 30px;
            border-radius: 25px;
            border: 3px solid #ff80ab;
            box-shadow: 0 10px 25px rgba(255, 128, 171, 0.4);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }

        h2 { 
            color: #d63384; 
            text-align: center; 
            font-size: 22px; 
            margin: 0 0 20px 0; 
        }
        
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto; /* Thanh cuộn xuất hiện khi chữ dài */
            padding-right: 10px;
            margin-bottom: 20px;
        }

        #text { 
            color: #881337; 
            line-height: 1.8; 
            font-size: 17px;
            white-space: pre-wrap;
        }

        .signature { 
            text-align: right; 
            font-weight: bold; 
            color: #d63384; 
            border-top: 1px dashed #ffb6c1; 
            padding-top: 10px; 
        }

        /* Mô phỏng khung nhạc ở dưới cùng */
        .music-bar {
            margin-top: 10px;
            height: 30px;
            background: #fff0f5;
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            color: #d63384;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="envelope">
        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container">
            <div id="text"></div>
        </div>
        <div class="signature">Từ: Mạnh Dũng</div>
        <div class="music-bar">▶️ ──────────────────── -00:00</div>
    </div>

    <script>
        // Nội dung bức thư của bạn
        const fullText = "Oaaaaaaa, helo ebe>< \n\nCaptainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa? \n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất. \n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        const textElement = document.getElementById("text");
        let i = 0;

        function typeWriter() {
            if (i < fullText.length) {
                textElement.textContent += fullText.charAt(i);
                // Tự động cuộn xuống khi đang viết
                document.getElementById("scroll-container").scrollTop = document.getElementById("scroll-container").scrollHeight;
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
