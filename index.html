<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bức thư của Mạnh Dũng</title>
    <style>
        body {
            margin: 0;
            background-color: #ffeef2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            padding: 10px;
        }

        .envelope {
            background: white;
            width: 100%;
            max-width: 400px;
            /* CỐ ĐỊNH CHIỀU CAO TẠI ĐÂY */
            height: 450px; 
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ff80ab;
            box-shadow: 0 5px 15px rgba(255, 128, 171, 0.3);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }

        h2 { 
            color: #d63384; 
            text-align: center; 
            font-size: 19px; 
            margin: 0 0 15px 0; 
            flex-shrink: 0; /* Giữ tiêu đề không bị thu nhỏ */
        }
        
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto; /* Thanh cuộn xuất hiện trong khung cố định */
            padding-right: 5px;
            margin-bottom: 10px;
        }

        #text { 
            color: #881337; 
            line-height: 1.5; 
            font-size: 16px;
            white-space: pre-wrap;
        }

        .footer-area {
            flex-shrink: 0; /* Giữ phần ký tên và nhạc không bị đẩy mất */
        }

        .signature { 
            text-align: right; 
            font-weight: bold; 
            color: #d63384; 
            margin-bottom: 5px;
        }

        .music-bar {
            border-top: 1px dashed #ff80ab;
            padding-top: 10px;
            display: flex;
            align-items: center;
            color: #d63384;
        }
    </style>
</head>
<body>

    <div class="envelope">
        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container">
            <div id="text"></div>
        </div>
        <div class="footer-area">
            <div class="signature">Từ: Mạnh Dũng</div>
            <div class="music-bar">▶️ ──────────────────── -00:00</div>
        </div>
    </div>

    <script>
        const fullText = "Captainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa?\n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất.\n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        const textElement = document.getElementById("text");
        let i = 0;

        function typeWriter() {
            if (i < fullText.length) {
                textElement.textContent += fullText.charAt(i);
                document.getElementById("scroll-container").scrollTop = document.getElementById("scroll-container").scrollHeight;
                i++;
                setTimeout(typeWriter, 40);
            }
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
