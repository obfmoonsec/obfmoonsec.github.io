<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(180deg, #fff0f5 0%, #ffcce0 100%); 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: sans-serif; overflow: hidden; position: relative;
        }

        /* Phong bì: Chiếm 80% chiều rộng màn hình, tối đa 400px */
        .envelope {
            width: 80vw; 
            max-width: 400px;
            height: 50vw; 
            max-height: 250px;
            background: #ff80ab;
            position: relative; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 40px rgba(255, 128, 171, 0.6);
            transition: 0.5s; z-index: 10;
        }
        .envelope:hover { transform: scale(1.02); }

        /* Nắp phong bì (tỉ lệ theo kích thước mới) */
        .envelope::after {
            content: ''; position: absolute; top: 0; left: 0;
            border-left: 40vw solid transparent; 
            border-right: 40vw solid transparent;
            border-top: 25vw solid #ff5a92; 
            max-border-left: 200px solid transparent;
            max-border-right: 200px solid transparent;
            max-border-top: 125px solid #ff5a92;
            transform-origin: top; transition: 0.5s;
        }

        .opened .envelope::after { transform: rotateX(180deg); }
        .opened .letter { top: -200px; opacity: 1; z-index: 1; }

        /* Lá thư */
        .letter {
            position: absolute; width: 75vw; max-width: 360px; 
            height: 45vw; max-height: 200px;
            background: white; top: 0; transition: 0.5s; opacity: 0; z-index: -1;
            padding: 20px; text-align: center; color: #d63384; font-size: 5vw;
            border: 2px solid #eee; display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
        }

        .decor { 
            position: absolute; font-size: 25px; z-index: 1; 
            animation: fall linear infinite; pointer-events: none;
        }
        @keyframes fall {
            0% { transform: translateY(-5vh) rotate(0deg); }
            100% { transform: translateY(105vh) rotate(360deg); }
        }

        .clouds { position: absolute; bottom: 0; width: 100%; height: 150px; background: #ff9fb3; border-radius: 50% 50% 0 0; z-index: 5; }
    </style>
</head>
<body>

    <div class="envelope" id="env" onclick="this.classList.toggle('opened')">
        <div class="letter">Gửi người con gái anh yêu... 💌</div>
    </div>

    <div class="clouds"></div>

    <script>
        function createDecor() {
            const symbols = ['🌸', '❤️', '✨'];
            for (let i = 0; i < 20; i++) {
                const div = document.createElement('div');
                div.className = 'decor';
                div.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                div.style.left = Math.random() * 100 + 'vw';
                div.style.animationDelay = Math.random() * 5 + 's';
                div.style.animationDuration = (Math.random() * 5 + 5) + 's';
                div.style.opacity = Math.random() * 0.6 + 0.2;
                document.body.appendChild(div);
            }
        }
        createDecor();
    </script>
</body>
</html>
