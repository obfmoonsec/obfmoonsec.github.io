<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời yêu thương gửi Cừu</title>
    <style>
        body { margin: 0; background-color: #ffeef2; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; width: 100%; height: 100vh; position: absolute; }
        #intro-screen { display: flex; } 

        .box { background: white; padding: 30px; border-radius: 20px; border: 2px solid #ff80ab; box-shadow: 0 10px 20px rgba(255, 128, 171, 0.3); width: 85%; max-width: 350px; text-align: center; }
        
        h1 { font-size: 20px; color: #d63384; white-space: nowrap; margin-bottom: 10px; }
        p { color: #d63384; margin-bottom: 20px; }
        
        button { padding: 12px 30px; background: #ff80ab; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ffb6c1; margin-bottom: 10px; width: 85%; }
        
        #text { text-align: left; color: #881337; font-size: 16px; line-height: 1.6; white-space: pre-wrap; }
    </style>
</head>
<body>

    <!-- Màn hình 1: Intro -->
    <div id="intro-screen" class="screen">
        <div class="box">
            <h1>🌸 Chào cậu, Người tớ yêu!</h1>
            <p>Có một điều bí mật dành riêng cho cậu đây...</p>
            <button onclick="showLogin()">Xem ngay đi 💌</button>
        </div>
    </div>

    <!-- Màn hình 2: Mật khẩu -->
    <div id="login-screen" class="screen">
        <div class="box">
            <h3>Mật khẩu của trái tim 🧡</h3>
            <input type="password" id="pass" placeholder="Nhập vào đây">
            <p style="font-size: 11px; color: #aaa;">Mật khẩu phải ghi liền không dấu*</p>
            <button onclick="checkPass()">Đồng ý</button>
        </div>
    </div>

    <!-- Màn hình 3: Thư -->
    <div id="letter-screen" class="screen">
        <div class="box">
            <div id="text"></div>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }

        function checkPass() {
            if (document.getElementById('pass').value.toLowerCase() === "sinhnhatcap") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('letter-screen').style.display = 'flex';
                typeWriter();
            } else { alert("Sai mật khẩu rồi ebe ơi!"); }
        }

        const msg = "Gửi Cừu nhỏ 🌸\n\nOaaaaaaa, helo ebe>< Captainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa?\n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất.\n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em.\n\nTừ: Cạp của Cừu ❤️";
        let i = 0;
        function typeWriter() {
            if (i < msg.length) {
                document.getElementById("text").textContent += msg.charAt(i);
                i++;
                setTimeout(typeWriter, 30);
            }
        }
    </script>
</body>
</html>
