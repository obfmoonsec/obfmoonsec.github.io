<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bức thư của Mạnh Dũng</title>
    <style>
        body {
            margin: 0;
            background-color: #fff0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            /* Tạo khoảng cách tổng thể cho toàn bộ trang */
            padding: 20px; 
            box-sizing: border-box;
        }

        .envelope {
            background: white;
            /* Dùng % để khung luôn thoáng so với mép màn hình */
            width: 90%; 
            max-width: 450px;
            /* Chiều cao cố định nhưng vẫn cho phép nội dung cuộn */
            height: 75vh; 
            min-height: 400px;
            padding: 25px;
            border-radius: 25px;
            border: 3px solid #ff80ab;
            box-shadow: 0 15px 35px rgba(255, 128, 171, 0.4);
            display: flex;
            flex-direction: column;
            /* Đảm bảo viền khung không chạm sát nội dung */
            box-sizing: border-box; 
        }

        h2 { color: #d63384; text-align: center; font-size: 22px; margin-bottom: 20px; }
        
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        #text { 
            color: #881337; 
            line-height: 1.8; 
            font-size: 17px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="envelope">
        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container">
            <div id="text"></div>
        </div>
        <div style="text-align: right; font-weight: bold; color: #d63384; margin-top: 15px; border-top: 1px solid #ffc0cb; padding-top: 10px;">Từ: Mạnh Dũng</div>
    </div>

    <script>
        const fullText = "Oaaaaaaa, helo ebe>< \n\nCaptainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa? \n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất. \n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        const textElement = document.getElementById("text");
        let i = 0;

        function typeWriter() {
            if (i < fullText.length) {
                textElement.textContent += fullText.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
