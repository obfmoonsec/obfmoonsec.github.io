<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời yêu thương</title>
    <style>
        body { margin: 0; background-color: #ffeef2; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; width: 100%; }
        #intro-screen { display: flex; } 

        .box { background: white; padding: 30px; border-radius: 20px; border: 2px solid #ff80ab; box-shadow: 0 5px 15px rgba(255, 128, 171, 0.3); width: 85%; max-width: 350px; }
        
        /* Đảm bảo tiêu đề luôn trên 1 dòng */
        h1 { font-size: 20px; color: #d63384; white-space: nowrap; }
        
        button { padding: 12px 30px; background: #ff80ab; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        input { padding: 10px; border-radius: 8px; border: 1px solid #ffb6c1; margin-bottom: 10px; width: 80%; }
    </style>
</head>
<body>

    <!-- Màn hình 1: Intro -->
    <div id="intro-screen" class="screen">
        <div class="box">
            <h1>🌸 Chào cậu, Người tớ yêu!</h1>
            <p>Có một điều bí mật dành riêng cho cậu đây...</p>
            <button onclick="showLogin()">Xem ngay đi 💌</button>
        </div>
    </div>

    <!-- Màn hình 2: Nhập mật khẩu -->
    <div id="login-screen" class="screen">
        <div class="box">
            <h3>Mật khẩu của trái tim 🧡</h3>
            <input type="password" id="pass" placeholder="Nhập vào đây">
            <br>
            <button onclick="checkPass()">Đồng ý</button>
        </div>
    </div>

    <!-- Màn hình 3: Bức thư -->
    <div id="letter-screen" class="screen">
        <div class="box">
            <h2 id="text" style="text-align: left; color: #881337; font-size: 16px; line-height: 1.6;"></h2>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }

        function checkPass() {
            // Mật khẩu là "sinhnhatcap"
            if (document.getElementById('pass').value.toLowerCase() === "sinhnhatcap") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('letter-screen').style.display = 'flex';
                typeWriter();
            } else { alert("Sai mật khẩu rồi ebe ơi!"); }
        }

        const msg = "Oaaaaaaa, helo ebe>< Captainboy bay tới dayyyy nè! Cừu ơi, Cạp nhớ Cừu nhiều lắm...";
        let i = 0;
        function typeWriter() {
            if (i < msg.length) {
                document.getElementById("text").textContent += msg.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
    </script>
</body>
</html>
