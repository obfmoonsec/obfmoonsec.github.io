<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cầu Vồng Tặng Nhi 🌈</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Nền bầu trời bình minh pastel dịu mát */
            background: linear-gradient(to bottom, #e0f2f1, #fce4ec, #fff3e0);
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- KHUNG TRANH CẦU VỒNG --- */
        .art-container {
            position: relative;
            width: 380px;
            height: 520px;
            background: linear-gradient(to top, #ffdde1 0%, #ee9ca7 100%);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(238, 156, 167, 0.3);
            overflow: hidden;
            border: 6px solid #fff;
            z-index: 2;
        }

        /* Hiệu ứng vẽ cầu vồng đường cong SVG */
        .rainbow-svg {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
        }

        .arc {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawArc 3s ease-out forwards;
        }

        /* Từng dải màu cầu vồng xuất hiện tuần tự */
        .red    { stroke: #ff4757; animation-delay: 0.2s; }
        .orange { stroke: #ffa502; animation-delay: 0.4s; }
        .yellow { stroke: #eccc68; animation-delay: 0.6s; }
        .green  { stroke: #2ed573; animation-delay: 0.8s; }
        .blue   { stroke: #1e90ff; animation-delay: 1.0s; }
        .purple { stroke: #9b5de5; animation-delay: 1.2s; }

        @keyframes drawArc {
            to { stroke-dashoffset: 0; }
        }

        /* Hai đám mây bồng bềnh biểu tượng */
        .cloud {
            position: absolute;
            bottom: 45%;
            font-size: 65px;
            filter: drop-shadow(0 8px 5px rgba(0,0,0,0.06));
            animation: floatCloud 4s infinite ease-in-out;
        }
        .cloud-left { left: 15px; animation-delay: 0s; }
        .cloud-right { right: 15px; animation-delay: 2s; }

        @keyframes floatCloud {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Hộp thông điệp nhỏ xinh xắn phía dưới */
        .message-card {
            position: absolute;
            bottom: 6%;
            left: 5%;
            width: 90%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .message-card h2 {
            font-size: 1.2rem;
            color: #6c5ce7;
            margin-bottom: 4px;
        }
        .message-card p {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        /* --- CANVAS HIỆU ỨNG HẠT CHẠM --- */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3; /* Nằm trên cùng để bao phủ hiệu ứng nổ */
            pointer-events: none;
        }

        /* --- CHỮ "CHÚC NHI..." BAY LÊN --- */
        .floating-wish {
            position: absolute;
            z-index: 9999;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff4757;
            text-shadow: 0 0 10px rgba(255,71,87,0.4), 2px 2px 4px rgba(0,0,0,0.1);
            pointer-events: none;
            white-space: nowrap;
            animation: flyUpAndFade 2s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        @keyframes flyUpAndFade {
            0% {
                transform: translate(-50%, -50%) translateY(0) scale(0.5);
                opacity: 0;
            }
            15% {
                opacity: 1;
                transform: translate(-50%, -50%) translateY(-30px) scale(1.1);
            }
            100% {
                transform: translate(-50%, -50%) translateY(-180px) scale(0.85);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="art-container">
        <svg class="rainbow-svg" viewBox="0 0 200 200">
            <path class="arc red" d="M 15,150 A 85,85 0 0,1 185,150" />
            <path class="arc orange" d="M 27,150 A 73,73 0 0,1 173,150" />
            <path class="arc yellow" d="M 39,150 A 61,61 0 0,1 161,150" />
            <path class="arc green" d="M 51,150 A 49,49 0 0,1 149,150" />
            <path class="arc blue" d="M 63,150 A 37,37 0 0,1 137,150" />
            <path class="arc purple" d="M 75,150 A 25,25 0 0,1 125,150" />
        </svg>

        <div class="cloud cloud-left">☁️</div>
        <div class="cloud cloud-right">☁️</div>

        <div class="message-card">
            <h2>Gửi Nhi ✨</h2>
            <p>Hãy chạm ngón tay vào màn hình xem nào!</p>
        </div>
    </div>

    <canvas id="magicCanvas"></canvas>

    <script>
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let sparks = [];
        const rainbowColors = ['#ff4757', '#ffa502', '#eccc68', '#2ed573', '#1e90ff', '#9b5de5', '#ff6b81'];

        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 3 + 1.5;
                this.color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.012;
                this.gravity = 0.08;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                
                // Vẽ ngôi sao lấp lánh nhỏ nhỏ
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            sparks = sparks.filter(s => s.alpha > 0);
            sparks.forEach(s => {
                s.update();
                s.draw();
            });
            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        // Xử lý sự kiện click/touch để kích hoạt đồng thời nổ hạt và hiện chữ
        function triggerMagic(clientX, clientY) {
            // 1. Tạo chùm hạt lấp lánh sắc màu
            for (let i = 0; i < 35; i++) {
                sparks.push(new Sparkle(clientX, clientY));
            }

            // 2. Tạo chữ bay lên
            const textEl = document.createElement('div');
            textEl.classList.add('floating-wish');
            textEl.innerText = "Chúc Nhi ngày mới vui vẻ! ✨";
            textEl.style.left = clientX + 'px';
            textEl.style.top = clientY + 'px';

            // Tạo độ nghiêng ngẫu nhiên nhẹ cho chữ thêm tự nhiên
            const randomRotation = Math.random() * 16 - 8; 
            textEl.style.transform = `translate(-50%, -50%) rotate(${randomRotation}deg)`;

            document.body.appendChild(textEl);

            // Tự động xóa thẻ div chữ sau khi bay mất tích (2 giây)
            setTimeout(() => {
                textEl.remove();
            }, 2000);
        }

        window.addEventListener('click', (e) => {
            triggerMagic(e.clientX, e.clientY);
        });

        window.addEventListener('touchstart', (e) => {
            triggerMagic(e.touches[0].clientX, e.touches[0].clientY);
        });
    </script>
</body>
</html>
