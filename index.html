<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bức thư của Mạnh Dũng</title>
    <style>
        body {
            margin: 0;
            background-color: #ffeef2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            overflow: hidden; /* Tránh thanh cuộn khi vật thể bay ra ngoài */
        }

        /* --- Hiệu ứng bay --- */
        .falling-item {
            position: absolute;
            top: -50px;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* --- Khung thư --- */
        .envelope {
            background: white;
            width: 350px;
            height: 350px;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #ff80ab;
            box-shadow: 0 5px 15px rgba(255, 128, 171, 0.4);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2; /* Đảm bảo khung thư nằm trên vật thể bay */
            box-sizing: border-box;
            /* Viền hoa góc */
            background-image: url('https://img.icons8.com/color/48/000000/sakura.png'), url('https://img.icons8.com/color/48/000000/sakura.png'), url('https://img.icons8.com/color/48/000000/sakura.png'), url('https://img.icons8.com/color/48/000000/sakura.png');
            background-position: -5px -5px, calc(100% + 5px) -5px, -5px calc(100% + 5px), calc(100% + 5px) calc(100% + 5px);
            background-repeat: no-repeat;
            background-size: 30px;
        }

        h2 { color: #d63384; text-align: center; font-size: 18px; margin: 0 0 15px 0; }
        #scroll-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 10px; }
        #text { color: #881337; line-height: 1.5; font-size: 15px; white-space: pre-wrap; }
        .footer-area { border-top: 1px dashed #ff80ab; padding-top: 10px; }
        .signature { text-align: right; font-weight: bold; color: #d63384; font-size: 14px; }
        .music-bar { margin-top: 8px; display: flex; align-items: center; color: #d63384; font-size: 12px; }
    </style>
</head>
<body>

    <div class="envelope">
        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container">
            <div id="text"></div>
        </div>
        <div class="footer-area">
            <div class="signature">Từ: Mạnh Dũng</div>
            <div class="music-bar">▶️ ──────────────────── -00:00</div>
        </div>
    </div>

    <script>
        const fullText = "Captainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa?\n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất.\n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        const textElement = document.getElementById("text");
        let i = 0;

        function typeWriter() {
            if (i < fullText.length) {
                textElement.textContent += fullText.charAt(i);
                document.getElementById("scroll-container").scrollTop = document.getElementById("scroll-container").scrollHeight;
                i++;
                setTimeout(typeWriter, 40);
            }
        }

        // Tạo trái tim và cánh hoa bay
        function createFallingItem() {
            const item = document.createElement("div");
            item.className = "falling-item";
            item.innerHTML = Math.random() > 0.5 ? "💖" : "🌸";
            item.style.left = Math.random() * 100 + "vw";
            item.style.fontSize = (Math.random() * 15 + 10) + "px";
            item.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 7000);
        }

        // Chạy hiệu ứng bay liên tục mỗi 500ms
        setInterval(createFallingItem, 500);
        window.onload = typeWriter;
    </script>
</body>
</html>
