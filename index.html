<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Cừu Nhỏ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffeef2; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Các màn hình */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; transition: opacity 0.5s; }
        .active { display: flex; }
        
        .box { background: white; padding: 30px; border-radius: 20px; border: 2px solid #ff80ab; text-align: center; box-shadow: 0 5px 15px rgba(255, 128, 171, 0.4); }
        input { padding: 10px; width: 200px; border: 1px solid #ff80ab; border-radius: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #ff80ab; color: white; border: none; border-radius: 10px; cursor: pointer; }

        /* Khung thư và hiệu ứng giữ nguyên của bạn */
        .envelope { background: white; width: 350px; height: 350px; padding: 25px; border-radius: 20px; border: 2px solid #ff80ab; box-shadow: 0 5px 15px rgba(255, 128, 171, 0.4); display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        #scroll-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 10px; scroll-behavior: smooth; }
        #text { color: #881337; line-height: 1.5; font-size: 15px; white-space: pre-wrap; text-align: left; }
        .footer-area { border-top: 1px dashed #ff80ab; padding-top: 10px; }
        .signature { text-align: right; font-weight: bold; color: #d63384; font-size: 14px; }
        
        #heart-center { position: fixed; font-size: 100px; opacity: 0; pointer-events: none; }
        .falling-item { position: absolute; top: -50px; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro" class="screen active">
        <div class="box">
            <h1>Chào Cừu Nhỏ 🌸</h1>
            <button onclick="nextScreen('intro', 'login')">Nhấn vào đây nè</button>
        </div>
    </div>

    <div id="login" class="screen">
        <div class="box">
            <h3>Nhập ngày sinh của Cừu đi 🧡</h3>
            <input type="password" id="pass" placeholder="Ví dụ: 04112007">
            <br>
            <button onclick="checkPass()">Tiếp tục</button>
        </div>
    </div>

    <div id="letter" class="screen">
        <div class="envelope">
            <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
            <div id="scroll-container"><div id="text"></div></div>
            <div class="footer-area">
                <div class="signature">Từ: Mạnh Dũng</div>
            </div>
        </div>
        <div id="heart-center">❤️</div>
    </div>

    <script>
        const fullText = "Captainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa?\n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất.\n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";

        function nextScreen(from, to) {
            document.getElementById(from).classList.remove('active');
            document.getElementById(to).classList.add('active');
        }

        function checkPass() {
            if(document.getElementById('pass').value === "04112007") {
                document.getElementById('login').innerHTML = "<div class='box'><h2>Loading... 🧸</h2></div>";
                setTimeout(() => {
                    nextScreen('login', 'letter');
                    startApp();
                }, 1500);
            } else {
                alert("Sai rồi Cừu ơi!");
            }
        }

        function startApp() {
            let i = 0;
            function typeWriter() {
                if (i < fullText.length) {
                    document.getElementById("text").textContent += fullText.charAt(i);
                    i++;
                    setTimeout(typeWriter, 40);
                } else {
                    document.getElementById("heart-center").style.opacity = "1";
                }
            }
            typeWriter();
            setInterval(createFallingItem, 500);
        }

        function createFallingItem() {
            const item = document.createElement("div");
            item.className = "falling-item";
            item.innerHTML = Math.random() > 0.5 ? "💖" : "🌸";
            item.style.left = Math.random() * 100 + "vw";
            item.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 7000);
        }
    </script>
</body>
</html>
