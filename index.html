<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bức thư của Mạnh Dũng</title>
    <style>
        body {
            margin: 0;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            background-image: radial-gradient(#f8bbd0 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .card {
            background: white;
            /* CỐ ĐỊNH KÍCH THƯỚC */
            width: 350px;
            height: 550px;
            padding: 30px;
            border-radius: 25px;
            border: 4px solid #ff80ab;
            box-shadow: 0 15px 35px rgba(255, 128, 171, 0.4);
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
        }

        .corner { position: absolute; font-size: 25px; }
        .top-left { top: -12px; left: -12px; }
        .top-right { top: -12px; right: -12px; }
        .bottom-left { bottom: -12px; left: -12px; }
        .bottom-right { bottom: -12px; right: -12px; }

        h2 { color: #d81b60; margin: 0 0 20px 0; font-size: 22px; text-align: center; }
        
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        #text { 
            color: #880e4f; 
            font-size: 20px; /* Chữ to rõ */
            font-style: italic; 
            line-height: 1.8; 
            white-space: pre-wrap;
        }

        .from { color: #c2185b; font-weight: bold; text-align: right; border-top: 2px dashed #ff80ab; padding-top: 15px; margin-top: 15px; font-size: 18px; }

        .player { background: #fce4ec; padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #ff80ab; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="corner top-left">🌸</div>
        <div class="corner top-right">🌸</div>
        <div class="corner bottom-left">🌸</div>
        <div class="corner bottom-right">🌸</div>

        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container">
            <div id="text"></div>
        </div>
        <div class="from">Từ: Mạnh Dũng</div>

        <div class="player">
            <div style="width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 15px solid #d81b60;"></div>
            <div style="flex-grow: 1; height: 6px; background: #ff80ab; border-radius: 3px;"></div>
            <span style="font-size: 12px; color: #d81b60;">-00:00</span>
        </div>
    </div>

    <script>
        const fullText = "Oaaaaaaa, helo ebe>< \n\nCaptainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa? \n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất. \n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        const textElement = document.getElementById("text");
        const container = document.getElementById("scroll-container");
        let i = 0;

        function typeWriter() {
            if (i < fullText.length) {
                textElement.textContent += fullText.charAt(i);
                container.scrollTop = container.scrollHeight;
                i++;
                setTimeout(typeWriter, 50); 
            }
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
