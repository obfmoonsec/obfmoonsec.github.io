<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Cừu Nhỏ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffeef2; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Màn hình */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; position: absolute; }
        .active { display: flex; }
        
        .box { background: white; padding: 40px; border-radius: 30px; border: 2px solid #ff80ab; text-align: center; box-shadow: 0 10px 25px rgba(255, 128, 171, 0.3); width: 300px; z-index: 10; }
        h1 { color: #d63384; font-size: 24px; margin-bottom: 15px; }
        input { padding: 12px; width: 85%; border: 2px solid #ff80ab; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        button { padding: 12px 25px; background: #ff80ab; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ff4081; transform: scale(1.05); }

        /* Trang trí cánh hoa */
        .decor { position: absolute; font-size: 30px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .d1 { top: 15%; left: 15%; } .d2 { top: 20%; right: 10%; } .d3 { bottom: 20%; left: 15%; } .d4 { bottom: 15%; right: 15%; }

        /* Khung thư */
        .envelope { background: white; width: 350px; height: 350px; padding: 25px; border-radius: 20px; border: 2px solid #ff80ab; display: flex; flex-direction: column; }
        #scroll-container { flex-grow: 1; overflow-y: auto; text-align: left; }
        #text { color: #881337; line-height: 1.6; white-space: pre-wrap; }
        .falling-item { position: absolute; top: -50px; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro" class="screen active">
        <div class="decor d1">🌸</div><div class="decor d2">✨</div><div class="decor d3">💖</div><div class="decor d4">🎀</div>
        <div class="box">
            <h1>🌸 Chào cậu, Người tớ yêu!</h1>
            <p>Có một điều bí mật dành riêng cho cậu đây...</p>
            <button onclick="nextScreen('intro', 'login')">Xem ngay đi 💌</button>
        </div>
    </div>

    <div id="login" class="screen">
        <div class="box">
            <h3>Nhập mật khẩu đi ebe 🧡</h3>
            <input type="password" id="pass" placeholder="Ngày sinh (04112007)">
            <button onclick="checkPass()">Đồng ý</button>
        </div>
    </div>

    <div id="letter" class="screen">
        <div class="envelope">
            <h2>Gửi Cừu Nhỏ 🌸</h2>
            <div id="scroll-container"><div id="text"></div></div>
            <div style="border-top: 1px dashed #ff80ab; padding-top: 10px; text-align: right; font-weight: bold; color: #d63384;">Từ: Mạnh Dũng</div>
        </div>
    </div>

    <script>
        const fullText = "Captainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa?\n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất.\n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";

        function nextScreen(from, to) {
            document.getElementById(from).classList.remove('active');
            document.getElementById(to).classList.add('active');
        }

        function checkPass() {
            if(document.getElementById('pass').value === "04112007") {
                const loginBox = document.querySelector('#login .box');
                loginBox.innerHTML = "<h2>Loading... 🧸</h2>";
                setTimeout(() => {
                    nextScreen('login', 'letter');
                    startApp();
                }, 1500);
            } else { alert("Sai rồi Cừu ơi!"); }
        }

        function startApp() {
            let i = 0;
            function typeWriter() {
                if (i < fullText.length) {
                    document.getElementById("text").textContent += fullText.charAt(i);
                    i++;
                    setTimeout(typeWriter, 40);
                }
            }
            typeWriter();
            setInterval(createFallingItem, 1500);
        }

        function createFallingItem() {
            const item = document.createElement("div");
            item.className = "falling-item";
            item.innerHTML = Math.random() > 0.5 ? "💖" : "🌸";
            item.style.left = Math.random() * 100 + "vw";
            item.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 7000);
        }
    </script>
</body>
</html>
