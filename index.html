<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Have The Key</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #ffdae0;
        }

        /* --- CẤU HÌNH CHUNG --- */
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s ease;
        }

        /* --- MÀN HÌNH 1: Ổ KHÓA (CHỜ) --- */
        #loading-screen { z-index: 100; }
        .lock-container { text-align: center; animation: beat 1.2s infinite alternate; }
        .lock-icon { font-size: 100px; filter: drop-shadow(0 0 10px white); }
        @keyframes beat { to { transform: scale(1.1); } }

        /* --- MÀN HÌNH 2: NHẬP MẬT KHẨU --- */
        #main-screen { display: none; opacity: 0; z-index: 50; }
        .card {
            background-color: #fff0f3;
            padding: 30px; border-radius: 20px;
            border: 2px solid #ffb1c1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 320px; text-align: center; position: relative;
        }
        input { width: 90%; padding: 12px; border: 1px solid #ffccd5; border-radius: 10px; outline: none; margin-bottom: 10px; }
        button { background-color: white; color: #d63384; border: 2px solid #ffb1c1; padding: 10px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .bear-img { position: absolute; bottom: 5px; right: 5px; font-size: 40px; }

        /* --- MÀN HÌNH 3: INTRO TRÁI TIM HỒNG ĐẬP (THAY CON ONG) --- */
        #heart-screen { display: none; opacity: 0; z-index: 150; background-color: #ffdae0; }
        
        /* Trái tim hồng lớn ở giữa */
        .big-heart {
            font-size: 120px;
            animation: heartPulse 0.8s infinite alternate cubic-bezier(0.215, 0.610, 0.355, 1);
            filter: drop-shadow(0 0 20px #ff758f);
        }
        @keyframes heartPulse {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.15); }
        }

        /* Hiệu ứng tim nhỏ bay bồng bềnh xung quanh */
        .floating-heart {
            position: absolute;
            color: #ff758f;
            pointer-events: none;
            animation: floatUp 2.5s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            15% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- MÀN HÌNH CUỐI: QUÀ TẶNG --- */
        #gift-screen { display: none; opacity: 0; z-index: 200; }
    </style>
</head>
<body>

    <!-- 1. Màn hình ổ khóa lúc đầu -->
    <div id="loading-screen" class="screen">
        <div class="lock-container">
            <div class="lock-icon">💖🔐</div> 
            <div style="color: #d63384; font-size: 24px; font-weight: bold; margin-top: 10px;">YOU HAVE THE KEY</div>
            <div style="color: #d63384; margin-top: 10px;">Đang tải....</div>
        </div>
    </div>

    <!-- 2. Màn hình nhập mật khẩu -->
    <div id="main-screen" class="screen">
        <div class="card">
            <h2>Có một lời yêu thương gửi tới bạn ❤️</h2>
            <label>Mật khẩu của trái tim 🧡</label>
            <input type="text" id="passInput" placeholder="Nhập vào đây">
            <p style="font-size: 11px; color: #888; margin-bottom: 20px;">Mật khẩu: <b>yeunhi</b></p>
            <button onclick="checkPass()">Đồng ý</button>
            <div class="bear-img">🧸</div>
        </div>
    </div>

    <!-- 3. Màn hình Intro Trái Tim Hồng (Chỉ hiện khi đúng pass) -->
    <div id="heart-screen" class="screen">
        <div class="big-heart">💗</div>
        <h2 style="color: #d63384; margin-top: 20px; font-weight: bold; letter-spacing: 1px;">Đang mở thư...</h2>
    </div>

    <!-- 4. Màn hình kết quả cuối cùng -->
    <div id="gift-screen" class="screen">
        <h1 style="color: #d63384;">Tặng Nhi nè! 🎁❤️</h1>
        <!-- Mục tiếp theo: Sẽ dán code bức thư âm nhạc vào đây nhé bạn -->
    </div>

    <script>
        // Tự động chuyển từ Ổ khóa sang Nhập mật khẩu sau 3s
        window.onload = function() {
            setTimeout(() => {
                fadeSwitch('loading-screen', 'main-screen');
            }, 3000);
        };

        let heartInterval; // Biến quản lý hiệu ứng tạo tim bay

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            if (pass.toLowerCase() === "yeunhi") {
                // Bước 1: Hiện màn hình Trái tim hồng
                fadeSwitch('main-screen', 'heart-screen');

                // Bắt đầu hiệu ứng tim nhỏ bay bồng bềnh liên tục
                heartInterval = setInterval(createFloatingHeart, 150);

                // Bước 2: Sau 3 giây ở màn hình này, tắt tim bay và chuyển sang màn quà tặng
                setTimeout(() => {
                    clearInterval(heartInterval); // Ngừng tạo tim bay
                    fadeSwitch('heart-screen', 'gift-screen');
                }, 3000);
            } else {
                alert("Sai mật khẩu rồi, thử lại nhé!");
            }
        }

        // Hàm tự động sinh trái tim nhỏ bay lên
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️', '💖', '💗', '💓'][Math.floor(Math.random() * 4)];
            heart.className = 'floating-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's'; // Tốc độ bay ngẫu nhiên
            
            document.getElementById('heart-screen').appendChild(heart);
            
            // Xóa tim sau khi bay xong để tránh lag máy
            setTimeout(() => { heart.remove(); }, 2500);
        }

        // Hàm hỗ trợ chuyển cảnh mượt mà
        function fadeSwitch(outId, inId) {
            const outEl = document.getElementById(outId);
            const inEl = document.getElementById(inId);

            outEl.style.opacity = '0';
            setTimeout(() => {
                outEl.style.display = 'none';
                inEl.style.display = 'flex';
                setTimeout(() => { inEl.style.opacity = '1'; }, 50);
            }, 1000);
        }
    </script>
</body>
</html>






<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bức thư tình</title>
    <style>
        body {
            margin: 0;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background-image: radial-gradient(#f8bbd0 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .card {
            background: white;
            width: 300px;
            height: 300px;
            padding: 20px;
            border-radius: 25px;
            border: 3px solid #ff80ab;
            box-shadow: 0 10px 30px rgba(255, 128, 171, 0.4);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10; /* Đưa khung lên trên hiệu ứng */
        }

        .corner { position: absolute; font-size: 24px; z-index: 2; }
        .top-left { top: -10px; left: -10px; }
        .top-right { top: -10px; right: -10px; }
        .bottom-left { bottom: -10px; left: -10px; }
        .bottom-right { bottom: -10px; right: -10px; }

        h2 { color: #d81b60; margin: 0 0 10px 0; font-size: 18px; text-align: center; }
        
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        #text { color: #880e4f; font-size: 15px; font-style: italic; line-height: 1.6; white-space: pre-wrap; }

        .from { color: #c2185b; font-weight: bold; text-align: right; border-top: 1px dashed #ff80ab; padding-top: 5px; margin-top: 10px; }

        .player { background: #fce4ec; padding: 8px; border-radius: 15px; display: flex; align-items: center; gap: 8px; border: 1px solid #ff80ab; }
        .play-icon { width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid #d81b60; }
        .bar { flex-grow: 1; height: 4px; background: #ff80ab; border-radius: 2px; }

        /* Hiệu ứng bay */
        .falling-item {
            position: absolute;
            bottom: -50px;
            z-index: 1;
            pointer-events: none;
            animation: flyUp 6s linear infinite;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="corner top-left">🌸</div>
        <div class="corner top-right">🌸</div>
        <div class="corner bottom-left">🌸</div>
        <div class="corner bottom-right">🌸</div>

        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container">
            <div id="text"></div>
        </div>
        <div class="from">Từ: Mạnh Dũng</div>

        <div class="player">
            <div class="play-icon"></div>
            <div class="bar"></div>
            <span style="font-size: 10px; color: #d81b60;">-00:00</span>
        </div>
    </div>

    <script>
        const fullText = "Oaaaaaaa, helo ebe>< \n\nCaptainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa? \n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất. \n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        const textElement = document.getElementById("text");
        const container = document.getElementById("scroll-container");
        let i = 0;

        // Hiệu ứng chữ
        function typeWriter() {
            if (i < fullText.length) {
                textElement.textContent += fullText.charAt(i);
                container.scrollTop = container.scrollHeight;
                i++;
                setTimeout(typeWriter, 50); 
            }
        }

        // Tạo trái tim và cánh hoa bay
        function createFallingItem() {
            const item = document.createElement("div");
            item.className = "falling-item";
            item.innerHTML = Math.random() > 0.5 ? "💖" : "🌸";
            item.style.left = Math.random() * 100 + "vw";
            item.style.fontSize = (Math.random() * 15 + 10) + "px";
            item.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 7000);
        }

        setInterval(createFallingItem, 800);
        window.onload = typeWriter;
    </script>
</body>
</html>
