<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời yêu thương cho Cừu</title>
    <style>
        body { margin: 0; background: #ffe1e6; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; overflow: hidden; }
        
        /* Hiệu ứng chuyển cảnh mượt mà */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            width: 100%;
            transition: opacity 0.8s ease-in-out;
            opacity: 0;
            z-index: 10;
        }
        .screen.active { display: flex; opacity: 1; }

        .box { background: #fff8f8; padding: 30px; border-radius: 20px; border: 1px solid #ff80ab; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 350px; position: relative; }
        h1, h3 { color: #d63384; margin-bottom: 15px; }
        input { padding: 12px; width: 90%; border-radius: 8px; border: 1px solid #ffb6c1; margin: 10px 0; }
        button { padding: 10px 25px; background: #ff80ab; color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* Trang trí */
        .decor { position: absolute; font-size: 30px; animation: float 3s ease-in-out infinite; z-index: 1; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .d1 { top: 15%; left: 15%; } .d2 { top: 20%; right: 10%; } .d3 { bottom: 20%; left: 10%; } .d4 { bottom: 15%; right: 15%; }
        .effect { position: absolute; top: -50px; z-index: 0; animation: fall linear infinite; font-size: 20px; }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div id="intro-screen" class="screen active">
        <div class="decor d1">🌸</div><div class="decor d2">✨</div><div class="decor d3">💖</div><div class="decor d4">🎀</div>
        <div class="box" style="text-align: center; z-index: 2;">
            <h1 style="white-space: nowrap; font-size: 20px; color: #d63384; margin-bottom: 10px;">
    🌸 Chào cậu, Người tớ yêu!
</h1>
            <p>Có một điều bí mật dành riêng cho cậu đây...</p>
            <button onclick="transitionScreen('intro-screen', 'login-screen')">Xem ngay đi 💌</button>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="box">
            <h3>Có một lời yêu thương gửi tới bạn 💌</h3>
            <p>Mật khẩu của trái tim 🧡</p>
            <input type="password" id="pass" placeholder="Nhập vào đây">
            <p style="font-size: 12px; color: #aaa;">Mật khẩu ngày sinh của bé (04112007)*</p>
            <button onclick="checkPass()">Đồng ý</button>
            <span style="position: absolute; right: 20px; bottom: 20px; font-size: 40px;">🧸</span>
        </div>
    </div>

    <div id="letter-screen" class="screen">
        <div class="box">
            <h2 style="color: #d63384; text-align: center;">Gửi Người Con Gái Anh Yêu 🌸</h2>
            <p id="letter-text" style="color: #881337; line-height: 1.6;"></p>
        </div>
    </div>

    <script>
        function transitionScreen(fromId, toId) {
            const from = document.getElementById(fromId);
            const to = document.getElementById(toId);
            from.style.opacity = '0';
            setTimeout(() => {
                from.classList.remove('active');
                to.classList.add('active');
                setTimeout(() => { to.style.opacity = '1'; }, 50);
            }, 800);
        }

        function checkPass() {
            if (document.getElementById('pass').value === "04112007") {
                transitionScreen('login-screen', 'letter-screen');
                typeWriter("Oaaaaaaa, helo ebe>< Captainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa? Cừu nhớ bé Cừu nhỏ quá đi huhuh...");
            } else { alert("Sai mật khẩu rồi ebe ơi!"); }
        }

        function typeWriter(text) {
            let i = 0;
            const el = document.getElementById("letter-text");
            function typing() {
                if (i < text.length) {
                    el.textContent += text.charAt(i);
                    i++;
                    setTimeout(typing, 50);
                }
            }
            typing();
        }

        function createEffect() {
            const el = document.createElement('div');
            el.className = 'effect';
            el.textContent = Math.random() > 0.5 ? '🌸' : '❤️';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = Math.random() * 3 + 5 + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 8000);
        }
        setInterval(createEffect, 800);
    </script>
</body>
</html>
