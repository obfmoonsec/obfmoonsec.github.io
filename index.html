<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bức thư của Mạnh Dũng</title>
    <style>
        body {
            margin: 0;
            background-color: #fff0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            padding: 15px;
        }

        .envelope {
            background: white;
            /* Khung vuông 400px, tự co giãn trên màn hình nhỏ */
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1; 
            padding: 30px;
            border-radius: 25px;
            border: 3px solid #ff80ab;
            box-shadow: 0 10px 25px rgba(255, 128, 171, 0.4);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h2 { 
            color: #d63384; 
            text-align: center; 
            font-size: 20px; 
            margin: 0 0 15px 0; 
        }
        
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 5px;
            margin-bottom: 10px;
        }

        #text { 
            color: #881337; 
            line-height: 1.6; 
            font-size: 17px;
            white-space: pre-wrap;
        }

        .signature { 
            text-align: right; 
            font-weight: bold; 
            color: #d63384; 
            border-top: 1px dashed #ffb6c1; 
            padding-top: 10px; 
        }
    </style>
</head>
<body>

    <div class="envelope">
        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container">
            <div id="text"></div>
        </div>
        <div class="signature">Từ: Mạnh Dũng</div>
    </div>

    <script>
        const fullText = "Oaaaaaaa, helo ebe>< \n\nCaptainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa? \n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất. \n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        const textElement = document.getElementById("text");
        let i = 0;

        function typeWriter() {
            if (i < fullText.length) {
                textElement.textContent += fullText.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
