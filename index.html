<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(180deg, #fff0f5 0%, #ffcce0 100%); 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: sans-serif; overflow: hidden; position: relative;
        }

        /* Phong bì */
        .envelope {
            width: 250px; height: 160px; background: #ff80ab;
            position: relative; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 128, 171, 0.5);
            transition: 0.5s; z-index: 10; /* Đưa phong bì lên cao nhất */
        }
        .envelope:hover { transform: scale(1.05); }

        .envelope::after {
            content: ''; position: absolute; top: 0; left: 0;
            border-left: 125px solid transparent; border-right: 125px solid transparent;
            border-top: 90px solid #ff5a92; transform-origin: top; transition: 0.5s;
        }

        .opened .envelope::after { transform: rotateX(180deg); }
        .opened .letter { top: -180px; opacity: 1; z-index: 1; }

        .letter {
            position: absolute; width: 220px; height: 130px; background: white;
            top: 0; transition: 0.5s; opacity: 0; z-index: -1;
            padding: 20px; text-align: center; color: #d63384; font-size: 1.2rem;
            border: 1px solid #eee; display: flex; align-items: center; justify-content: center;
        }

        /* Hiệu ứng rơi toàn màn hình */
        .decor { 
            position: absolute; font-size: 20px; z-index: 1; 
            animation: fall linear infinite; pointer-events: none;
            top: -20px; /* Bắt đầu từ trên đỉnh */
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }

        .clouds { position: absolute; bottom: 0; width: 100%; height: 150px; background: #ff9fb3; border-radius: 50% 50% 0 0; z-index: 5; }
    </style>
</head>
<body>

    <div class="envelope" id="env" onclick="this.classList.toggle('opened')">
        <div class="letter">Gửi người con gái anh yêu... 💌</div>
    </div>

    <div class="clouds"></div>

    <script>
        function createDecor() {
            const symbols = ['🌸', '❤️', '✨'];
            // Tăng số lượng và dàn trải khắp màn hình
            for (let i = 0; i < 20; i++) {
                const div = document.createElement('div');
                div.className = 'decor';
                div.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                // Phủ toàn bộ chiều ngang màn hình
                div.style.left = Math.random() * 100 + 'vw';
                // Thời gian trễ ngẫu nhiên để rơi so le
                div.style.animationDelay = Math.random() * 5 + 's';
                div.style.animationDuration = (Math.random() * 5 + 5) + 's';
                div.style.opacity = Math.random() * 0.6 + 0.2;
                document.body.appendChild(div);
            }
        }
        createDecor();
    </script>
</body>
</html>
