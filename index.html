<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bức thư của Mạnh Dũng</title>
    <style>
        body {
            margin: 0;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            background-image: radial-gradient(#f8bbd0 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
        }

        .card {
            background: white;
            /* Dùng % để khung thư luôn chiếm 92% bề ngang điện thoại */
            width: 92vw;
            /* Chiều cao tự động dựa trên nội dung nhưng tối đa là 80% màn hình */
            max-height: 80vh; 
            padding: 25px;
            border-radius: 25px;
            border: 3px solid #ff80ab;
            box-shadow: 0 10px 25px rgba(255, 128, 171, 0.4);
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
        }

        /* Trang trí góc */
        .corner { position: absolute; font-size: 20px; }
        .top-left { top: -10px; left: -10px; }
        .top-right { top: -10px; right: -10px; }
        .bottom-left { bottom: -10px; left: -10px; }
        .bottom-right { bottom: -10px; right: -10px; }

        h2 { color: #d81b60; margin: 0 0 15px 0; font-size: 1.4rem; text-align: center; }
        
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto; /* Tự động cuộn khi chữ dài */
            padding-right: 5px;
        }

        #text { 
            color: #880e4f; 
            font-size: 1.2rem; /* Chữ to, dễ đọc */
            font-style: italic; 
            line-height: 1.7; 
            white-space: pre-wrap;
        }

        .from { color: #c2185b; font-weight: bold; text-align: right; border-top: 1px dashed #ff80ab; padding-top: 10px; margin-top: 10px; font-size: 1.1rem; }

        .player { background: #fce4ec; padding: 10px; border-radius: 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #ff80ab; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="corner top-left">🌸</div>
        <div class="corner top-right">🌸</div>
        <div class="corner bottom-left">🌸</div>
        <div class="corner bottom-right">🌸</div>

        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container">
            <div id="text"></div>
        </div>
        <div class="from">Từ: Mạnh Dũng</div>

        <div class="player">
            <div style="width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid #d81b60;"></div>
            <div style="flex-grow: 1; height: 5px; background: #ff80ab; border-radius: 3px;"></div>
            <span style="font-size: 0.9rem; color: #d81b60;">-00:00</span>
        </div>
    </div>

    <script>
        const fullText = "Oaaaaaaa, helo ebe>< \n\nCaptainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa? \n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất. \n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        const textElement = document.getElementById("text");
        const container = document.getElementById("scroll-container");
        let i = 0;

        function typeWriter() {
            if (i < fullText.length) {
                textElement.textContent += fullText.charAt(i);
                container.scrollTop = container.scrollHeight;
                i++;
                setTimeout(typeWriter, 50); 
            }
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
