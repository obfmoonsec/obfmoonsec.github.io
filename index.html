<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bức thư của Mạnh Dũng</title>
    <style>
        body {
            margin: 0;
            background-color: #ffeef2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .envelope {
            background: white;
            /* Thiết lập khung cố định hình vuông */
            width: 350px;
            height: 350px;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #ff80ab;
            box-shadow: 0 5px 15px rgba(255, 128, 171, 0.4);
            display: flex;
            flex-direction: column;
            position: relative;
            /* Tạo viền hoa ở 4 góc */
            background-image: 
                url('https://img.icons8.com/color/48/000000/sakura.png'), /* Hoa góc trái trên */
                url('https://img.icons8.com/color/48/000000/sakura.png'), /* Hoa góc phải trên */
                url('https://img.icons8.com/color/48/000000/sakura.png'), /* Hoa góc trái dưới */
                url('https://img.icons8.com/color/48/000000/sakura.png'); /* Hoa góc phải dưới */
            background-position: -5px -5px, calc(100% + 5px) -5px, -5px calc(100% + 5px), calc(100% + 5px) calc(100% + 5px);
            background-repeat: no-repeat;
            background-size: 30px;
        }

        h2 { 
            color: #d63384; 
            text-align: center; 
            font-size: 18px; 
            margin: 0 0 15px 0; 
        }
        
        #scroll-container {
            flex-grow: 1;
            overflow-y: auto; /* Thanh cuộn nếu chữ dài */
            padding-right: 5px;
            margin-bottom: 10px;
        }

        #text { 
            color: #881337; 
            line-height: 1.5; 
            font-size: 15px;
            white-space: pre-wrap;
        }

        .footer-area {
            border-top: 1px dashed #ff80ab;
            padding-top: 10px;
        }

        .signature { 
            text-align: right; 
            font-weight: bold; 
            color: #d63384; 
            font-size: 14px;
        }

        .music-bar {
            margin-top: 8px;
            display: flex;
            align-items: center;
            color: #d63384;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="envelope">
        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container">
            <div id="text"></div>
        </div>
        <div class="footer-area">
            <div class="signature">Từ: Mạnh Dũng</div>
            <div class="music-bar">▶️ ──────────────────── -00:00</div>
        </div>
    </div>

    <script>
        const fullText = "Captainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa?\n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất.\n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        const textElement = document.getElementById("text");
        let i = 0;

        function typeWriter() {
            if (i < fullText.length) {
                textElement.textContent += fullText.charAt(i);
                document.getElementById("scroll-container").scrollTop = document.getElementById("scroll-container").scrollHeight;
                i++;
                setTimeout(typeWriter, 40);
            }
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
