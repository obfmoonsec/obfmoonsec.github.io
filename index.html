<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Cừu Nhỏ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffeef2; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Khung thư */
        .envelope { background: white; width: 350px; height: 350px; padding: 25px; border-radius: 20px; border: 2px solid #ff80ab; box-shadow: 0 5px 15px rgba(255, 128, 171, 0.4); display: flex; flex-direction: column; position: relative; z-index: 2; box-sizing: border-box; background-image: url('https://img.icons8.com/color/48/000000/sakura.png'), url('https://img.icons8.com/color/48/000000/sakura.png'), url('https://img.icons8.com/color/48/000000/sakura.png'), url('https://img.icons8.com/color/48/000000/sakura.png'); background-position: -5px -5px, calc(100% + 5px) -5px, -5px calc(100% + 5px), calc(100% + 5px) calc(100% + 5px); background-repeat: no-repeat; background-size: 30px; }
        h2 { color: #d63384; text-align: center; font-size: 18px; margin: 0 0 15px 0; }
        
        #scroll-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 10px; scroll-behavior: smooth; }
        #text { color: #881337; line-height: 1.5; font-size: 15px; white-space: pre-wrap; }
        
        .footer-area { border-top: 1px dashed #ff80ab; padding-top: 10px; }
        .signature { text-align: right; font-weight: bold; color: #d63384; font-size: 14px; }
        .music-bar { margin-top: 8px; color: #d63384; font-size: 12px; }

        /* Hiệu ứng kết thúc */
        #heart-center { position: fixed; font-size: 100px; z-index: 99; opacity: 0; transition: opacity 2s ease-in; filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.8)); pointer-events: none; }
        .heart-beat { animation: heartbeat 1.2s ease-in-out infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 25% { transform: scale(1.2); } }

        #love-text { position: fixed; z-index: 100; font-size: 50px; color: #d63384; font-weight: bold; opacity: 0; pointer-events: none; }
        .grow-fade { animation: growAndFade 3s ease-out forwards; }
        @keyframes growAndFade { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        .falling-item { position: absolute; top: -50px; z-index: 1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>
 <audio id="myAudio" autoplay loop></audio>

<script>
    // Danh sách bài hát của bạn
    const playlist = ["audio/12dem_1.mp3", "audio/vuanmayvuahay.mp3"];
    const audio = document.getElementById("myAudio");

    // Biến lưu trữ index bài hát vừa phát
    let lastIndex = -1;

    function playNextSong() {
        let nextIndex;
        
        // Chọn ngẫu nhiên index mới mà không trùng với lastIndex
        do {
            nextIndex = Math.floor(Math.random() * playlist.length);
        } while (nextIndex === lastIndex && playlist.length > 1);

        lastIndex = nextIndex;
        audio.src = playlist[nextIndex];
        
        // Cố gắng phát ngay
        audio.play().catch(() => {
            // Nếu bị trình duyệt chặn, chờ tương tác lần đầu
            document.body.addEventListener('click', () => {
                audio.play();
            }, { once: true });
        });
    }

    // Sự kiện khi nhạc kết thúc: Tự động chuyển bài
    audio.addEventListener('ended', () => {
        playNextSong();
    });

    // Khởi động nhạc lần đầu khi trang load (theo yêu cầu của bạn)
    window.addEventListener('load', () => {
        playNextSong();
    });

    // ... GIỮ NGUYÊN các hàm typeWriter, startFinale... của bạn ở đây
</script>
    <div class="envelope" id="letter">
        <h2>Gửi Người Con Gái Anh Yêu 🌸</h2>
        <div id="scroll-container"><div id="text"></div></div>
        <div class="footer-area">
            <div class="signature">Từ: Mạnh Dũng</div>
            <div class="music-bar">▶️ ──────────────────── -00:00</div>
        </div>
    </div>

    <div id="heart-center">❤️</div>
    <div id="love-text">Yêu em!</div>

    <script>
        const fullText = "Captainboy bay tới dayyyy nè! Ebe của Cap đang làm gì zaa? Có nhớ Cap hong rứa?\n\nGiữa những bộn bề, Cap chỉ muốn gói ghém tất cả yêu thương vào đây gửi đến Cừu. Mỗi ngày trôi qua, được trò chuyện cùng em là điều khiến Cap thấy hạnh phúc nhất.\n\nĐừng quên ăn uống đầy đủ và giữ gìn sức khỏe nha. Dù có chuyện gì, Cap vẫn luôn ở đây bên cạnh em. Cừu mãi là Cừu nhỏ đáng yêu nhất của Cap! ❤️";
        
        window.onload = () => {
            typeWriter();
            setInterval(createFallingItem, 500);
        };

        let i = 0;
        function typeWriter() {
            if (i < fullText.length) {
                const textElem = document.getElementById("text");
                textElem.textContent += fullText.charAt(i);
                
                // Tự động cuộn
                const container = document.getElementById("scroll-container");
                container.scrollTop = container.scrollHeight;
                
                i++;
                setTimeout(typeWriter, 40);
            } else {
                startFinale();
            }
        }

        function startFinale() {
            const heart = document.getElementById("heart-center");
            heart.style.opacity = "1";
            heart.classList.add("heart-beat");
            
            setTimeout(() => {
                heart.style.display = "none";
                document.getElementById("love-text").classList.add("grow-fade");
                triggerFireworks();
            }, 3000);
        }

        function triggerFireworks() {
            const end = Date.now() + 3000;
            const colors = ['#ff4d4d', '#ff94c2', '#ffccd5'];
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors: colors, shapes: ['heart'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors: colors, shapes: ['heart'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function createFallingItem() {
            const item = document.createElement("div");
            item.className = "falling-item";
            item.innerHTML = Math.random() > 0.5 ? "💖" : "🌸";
            item.style.left = Math.random() * 100 + "vw";
            item.style.fontSize = (Math.random() * 15 + 10) + "px";
            item.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 7000);
        }
    </script>
</body>
</html>
